name: Package

on:
  push:
    branches: "*"
    tags: "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: spider-themes/package@v1
        with:
          slug: ${{ vars.SLUG }}
          prod_files: ${{ vars.PROD_FILES }}
          gdrive_token: ${{ secrets.GDRIVE_TOKEN }}
          wp_org_username: ${{ secrets.WP_ORG_USERNAME }}
          wp_org_password: ${{ secrets.WP_ORG_PASSWORD }}
